paragraph1: "Urban Fitness is more than a gym — it's a community. With a strong family vibe, a spacious facility, premium equipment, and a wide range of classes, we create a space where everyone feels supported and motivated."
paragraph2: "Located at 156 Chadwick Road, Greerton, we are Tauranga's premier training destination. With 24/7 access, 60+ weekly classes, and a dedicated crew, we've created an environment where everyone belongs."
paragraph3: "We're here to support our community — helping people grow stronger, together."
